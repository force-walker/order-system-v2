services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_system_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_system_v2"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
